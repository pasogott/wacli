name: docker

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: docker build --pull -t wacli:ci .

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm wacli:ci --version
          docker run --rm wacli:ci --help
          docker run --rm --entrypoint ffmpeg wacli:ci -version
